AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31

Description: >
  S3-triggered Lambda that parses documents, generates embeddings,
  builds a ChromaDB index, and uploads it to another bucket


Parameters:
  SourceBucketName:
    Type: String
    Default: ignisia-raw

  DestinationBucketName:
    Type: String
    Default: ignisia-vector
  
  EmbedModel:
    Type: String
    Default: sentence-transformers/all-MiniLM-L6-v2

  ChromaCollectionPrefix:
    Type: String
    Default: docs 
  
  ChunkSize:
    Type: Number
    Default: 1000

  ChunkOverlap:
    Type: Number
    Default: 200

  
Globals:
  Function:
    Timeout: 900
    MemorySize: 3008
    Architectures:
      - x86_64
    EphemeralStorage:
      Size: 5120
    Environment:
      Variables:
        DEST_BUCKET: !Ref DestinationBucketName
        EMBED_MODEL: !Ref EmbedModel
        CHROMA_COLLECTION_PREFIX: !Ref ChromaCollectionPrefix
        CHUNK_SIZE: !Ref ChunkSize
        CHUNK_OVERLAP: !Ref ChunkOverlap
        TRANSFORMERS_CACHE: /tmp/hf_cache
        HF_HOME: /tmp/hf_cache

Resources:
  SourceBucket:
    Type: AWS::S3::Bucket 
    Properties:
      BucketName: !Ref SourceBucketName

  DestinationBucket:
    Type: AWS::S3::Bucket 
    Properties:
      BucketName: !Ref DestinationBucketName

  EmbeddingLambdaRole:
    Type: AWS::IAM::Role 
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com 
            Action: sts:AssumeRole 

      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

      Policies:
        - PolicyName: S3AccessPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement: 
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:HeadObject
                Resource: !Sub "arn:aws:s3:::${SourceBucketName}/*"

              # Writing to destination bucket
              - Effect: Allow
                Action:
                  - s3:PutObject
                Resource: !Sub "arn:aws:s3:::${DestinationBucketName}/*"

  EmbeddingFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ignisia-embedding-pipeline
      PackageType: Image
      Role: !GetAtt EmbeddingLambdaRole.Arn 

      Events:
        S3Trigger:
          Type: S3
          Properties:
            Bucket: !Ref SourceBucket
            Events:
              - s3:ObjectCreated:*

            Filter:
              S3Key:
                Rules:
                  - Name: prefix
                    Value: raw/

    Metadata: 
      Dockerfile: Dockerfile
      DockerContext: .
      DockerTag: v1


Outputs:
  LambdaFunctionArn:
    Value: !GetAtt EmbeddingFunction.Arn 

  SourceBucketName:
    Value: !Ref SourceBucket

  DestinationBucketName:
    Value: !Ref DestinationBucket




  